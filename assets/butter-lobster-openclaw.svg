<svg xmlns="http://www.w3.org/2000/svg" width="640" height="280" viewBox="0 0 640 280" role="img" aria-label="Butter Lobster OpenClaw mascot">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8e6"/>
      <stop offset="100%" stop-color="#ffe9b3"/>
    </linearGradient>
  </defs>
  <rect width="640" height="280" rx="20" fill="url(#bg)"/>

  <!-- Butter dish -->
  <ellipse cx="145" cy="205" rx="95" ry="30" fill="#d8c9a1"/>
  <rect x="75" y="155" width="140" height="52" rx="18" fill="#f7e27a" stroke="#d6b93d" stroke-width="4"/>
  <text x="145" y="188" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#7a5a00">BUTTER</text>

  <!-- Lobster mascot -->
  <ellipse cx="360" cy="145" rx="92" ry="72" fill="#d84a3a"/>
  <ellipse cx="360" cy="208" rx="52" ry="24" fill="#c93b2d"/>

  <!-- Eyes -->
  <circle cx="330" cy="115" r="10" fill="#fff"/>
  <circle cx="390" cy="115" r="10" fill="#fff"/>
  <circle cx="333" cy="117" r="4" fill="#222"/>
  <circle cx="393" cy="117" r="4" fill="#222"/>

  <!-- Smile -->
  <path d="M333 147 Q360 168 387 147" stroke="#fff4ea" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Antennas -->
  <path d="M318 94 C285 58, 260 54, 237 60" stroke="#b93024" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M402 94 C435 58, 460 54, 483 60" stroke="#b93024" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Claws -->
  <ellipse cx="255" cy="145" rx="34" ry="24" fill="#d84a3a"/>
  <ellipse cx="465" cy="145" rx="34" ry="24" fill="#d84a3a"/>
  <path d="M228 145 q-20 -20 0 -35 q18 6 26 21 q-8 12 -26 14z" fill="#c93b2d"/>
  <path d="M492 145 q20 -20 0 -35 q-18 6 -26 21 q8 12 26 14z" fill="#c93b2d"/>

  <!-- Title -->
  <text x="520" y="135" text-anchor="end" font-size="34" font-weight="700" font-family="Arial, sans-serif" fill="#7b2a1f">Butter Lobster</text>
  <text x="520" y="172" text-anchor="end" font-size="30" font-weight="700" font-family="Arial, sans-serif" fill="#7b2a1f">OpenClaw</text>

  <!-- Small claw icon -->
  <text x="540" y="210" font-size="34">🦞</text>
</svg>
