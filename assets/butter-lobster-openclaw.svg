<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-label="Butter Lobster OpenClaw mascot v2">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7df"/>
      <stop offset="100%" stop-color="#ffe7a3"/>
    </linearGradient>
    <linearGradient id="shell" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6a54"/>
      <stop offset="100%" stop-color="#dc4432"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#a3691c" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="900" height="420" rx="28" fill="url(#bg)"/>

  <!-- plate -->
  <ellipse cx="450" cy="348" rx="300" ry="44" fill="#e8d8b5" opacity="0.95"/>
  <ellipse cx="450" cy="342" rx="292" ry="36" fill="#f6ead0"/>

  <!-- butter block -->
  <g transform="translate(160 250)" filter="url(#softShadow)">
    <ellipse cx="120" cy="90" rx="112" ry="28" fill="#d2c094"/>
    <rect x="34" y="18" width="172" height="76" rx="18" fill="#ffe46d" stroke="#d8b645" stroke-width="4"/>
    <rect x="45" y="30" width="150" height="18" rx="9" fill="#fff5a8" opacity="0.75"/>
    <text x="120" y="67" text-anchor="middle" font-size="28" font-family="Arial, sans-serif" font-weight="700" fill="#7b5a00">BUTTER</text>
  </g>

  <!-- lobster mascot -->
  <g transform="translate(420 78)" filter="url(#softShadow)">
    <!-- tail -->
    <ellipse cx="115" cy="245" rx="68" ry="28" fill="#c6382a"/>

    <!-- body -->
    <ellipse cx="115" cy="155" rx="112" ry="88" fill="url(#shell)"/>

    <!-- stripes -->
    <path d="M45 146 h140" stroke="#b73225" stroke-width="6" opacity="0.6"/>
    <path d="M35 174 h160" stroke="#b73225" stroke-width="6" opacity="0.6"/>

    <!-- face panel -->
    <ellipse cx="115" cy="153" rx="70" ry="56" fill="#ff8e7a" opacity="0.32"/>

    <!-- eyes -->
    <circle cx="82" cy="124" r="15" fill="#fff"/>
    <circle cx="148" cy="124" r="15" fill="#fff"/>
    <circle cx="86" cy="127" r="6" fill="#222"/>
    <circle cx="152" cy="127" r="6" fill="#222"/>
    <circle cx="88" cy="124" r="2" fill="#fff"/>
    <circle cx="154" cy="124" r="2" fill="#fff"/>

    <!-- blush -->
    <ellipse cx="66" cy="160" rx="10" ry="6" fill="#ffb1a2"/>
    <ellipse cx="164" cy="160" rx="10" ry="6" fill="#ffb1a2"/>

    <!-- smile -->
    <path d="M79 173 Q115 200 151 173" stroke="#fff5ee" stroke-width="7" fill="none" stroke-linecap="round"/>

    <!-- antenna -->
    <path d="M62 92 C20 36 -18 34 -56 48" stroke="#b43024" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M168 92 C210 36 248 34 286 48" stroke="#b43024" stroke-width="7" fill="none" stroke-linecap="round"/>

    <!-- left claw arm -->
    <path d="M8 156 C-20 152 -45 145 -72 127" stroke="#cf3f2f" stroke-width="18" fill="none" stroke-linecap="round"/>
    <ellipse cx="-96" cy="116" rx="32" ry="24" fill="#e0503d"/>
    <path d="M-126 116 q-20 -20 0 -34 q18 6 28 20 q-8 13 -28 14z" fill="#c73a2c"/>

    <!-- right claw arm -->
    <path d="M222 156 C250 152 275 145 302 127" stroke="#cf3f2f" stroke-width="18" fill="none" stroke-linecap="round"/>
    <ellipse cx="326" cy="116" rx="32" ry="24" fill="#e0503d"/>
    <path d="M356 116 q20 -20 0 -34 q-18 6 -28 20 q8 13 28 14z" fill="#c73a2c"/>

    <!-- melting butter on head -->
    <g transform="translate(58 28)">
      <rect x="24" y="12" width="74" height="34" rx="10" fill="#ffe46d" stroke="#d8b645" stroke-width="3"/>
      <rect x="30" y="18" width="62" height="10" rx="5" fill="#fff4a3" opacity="0.8"/>
      <!-- butter drips -->
      <path d="M38 44 C34 56, 36 63, 44 66 C52 63, 54 56, 50 44 Z" fill="#ffe46d" stroke="#d8b645" stroke-width="2"/>
      <path d="M61 44 C57 55, 59 64, 67 67 C75 64, 77 55, 73 44 Z" fill="#ffe46d" stroke="#d8b645" stroke-width="2"/>
      <path d="M85 44 C81 54, 83 60, 91 63 C98 60, 100 54, 97 44 Z" fill="#ffe46d" stroke="#d8b645" stroke-width="2"/>
      <!-- tiny gloss -->
      <circle cx="45" cy="24" r="3" fill="#fff9c8"/>
      <circle cx="72" cy="22" r="3" fill="#fff9c8"/>
    </g>
  </g>

  <!-- title -->
  <g transform="translate(650 146)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="44" font-weight="800" fill="#7a2d23">Butter Lobster</text>
    <text x="0" y="48" font-family="Arial, sans-serif" font-size="40" font-weight="800" fill="#7a2d23">OpenClaw</text>
    <text x="0" y="94" font-family="Arial, sans-serif" font-size="20" fill="#8e5e20">friendly public starter kit</text>
  </g>

  <!-- sparkles -->
  <g fill="#fff6bf" stroke="#f3d66b" stroke-width="2">
    <path d="M760 74 l7 14 14 7 -14 7 -7 14 -7 -14 -14 -7 14 -7z"/>
    <path d="M708 252 l5 10 10 5 -10 5 -5 10 -5 -10 -10 -5 10 -5z"/>
    <path d="M290 78 l5 10 10 5 -10 5 -5 10 -5 -10 -10 -5 10 -5z"/>
  </g>
</svg>
